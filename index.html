<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Class Work 03</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <form action="codd.cs.gsu.edu/~sluu5/wp/cw/3/index.php" method="post">
            <label>Your Name: <input name="visitor_name" type="text"></label>
            <label>Password: <input name="password" type="password"></label>

            <!-- Important fix: name must end with [] for multi-select arrays -->
            <label>Optional features:</label>
            <select name="options[]" size="6" multiple>
                <option>Chat</option>
                <option>Email</option>
                <option>File transfer</option>
                <option>Directory</option>
                <option>Shell</option>
                <option>Remote control</option>
            </select>

            <button type="submit">Sign Up</button>
        </form>
    </body>
</html>
